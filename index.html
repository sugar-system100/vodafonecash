
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم بندق - فودافون كاش</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fdfbf7; }
        .hidden { display: none !important; }
        .input-lg { width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 1.125rem; }
        .input-lg:focus { outline: none; border-color: #dc2626; box-shadow: 0 0 0 2px rgba(220, 38, 38, 0.2); }
        .label-lg { display: block; color: #374151; font-weight: 700; margin-bottom: 0.5rem; font-size: 1.125rem; }
        .tab-btn { flex: 1; text-align: center; padding: 1rem; font-size: 1.25rem; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        .tab-active { background-color: #dc2626; color: white; border-radius: 0.5rem 0.5rem 0 0; }
        .tab-inactive { background-color: #e5e7eb; color: #4b5563; border-radius: 0.5rem 0.5rem 0 0; }
    </style>
</head>
<body class="p-4 md:p-8 text-gray-800">

    <!-- شاشة تسجيل الدخول المحدثة بشعار ضخم -->
    <div id="loginView" class="max-w-xl mx-auto mt-16">
        <div class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-extrabold text-red-600 mb-4 drop-shadow-md">حلواني بُـنـدق</h1>
            <h2 class="text-2xl md:text-3xl font-bold text-gray-700">لوحة تحكم فودافون كاش</h2>
        </div>
        <div class="bg-white rounded-xl shadow-lg p-8 md:p-10 border-t-4 border-red-600">
            <div class="mb-6">
                <label class="label-lg">اسم المستخدم</label>
                <input type="text" id="username" class="input-lg text-center" placeholder="أدخل اسمك">
            </div>
            <div class="mb-8">
                <label class="label-lg">كلمة المرور</label>
                <input type="password" id="password" class="input-lg text-center" placeholder="••••••••">
            </div>
            <button onclick="login()" class="w-full bg-red-600 text-white font-bold py-4 rounded-lg text-xl hover:bg-red-700 shadow-md transition">تسجيل الدخول</button>
            <p id="loginError" class="text-red-500 text-center mt-6 font-bold text-lg hidden"></p>
        </div>
    </div>

    <!-- شاشة الموظفين (خدمة العملاء) -->
    <div id="staffView" class="max-w-4xl mx-auto hidden">
        <div class="bg-white rounded-xl shadow-lg p-6 md:p-10 mb-8 border-t-4 border-red-600">
            <div class="flex justify-between items-center mb-8 border-b-2 border-gray-100 pb-6">
                <div>
                    <h2 class="text-3xl font-bold text-red-600">نظام فودافون كاش</h2>
                    <p class="text-gray-500 text-lg mt-1">يوم عمل موفق إن شاء الله</p>
                </div>
                <div class="text-lg font-bold bg-red-50 text-red-800 border border-red-200 px-6 py-3 rounded-lg shadow-sm">
                    موظف: <span id="staffNameDisplay" class="text-red-600 ml-2"></span>
                    <button onclick="logout()" class="mr-6 text-sm text-gray-500 hover:text-red-500 underline">خروج</button>
                </div>
            </div>

            <!-- أزرار التبديل بين الأوردر والسحب -->
            <div class="flex mb-6 rounded-t-lg">
                <div id="tabTransfer" onclick="switchTab('transfer')" class="tab-btn tab-active">تسجيل أوردر (تحويل)</div>
                <div id="tabWithdraw" onclick="switchTab('withdraw')" class="tab-btn tab-inactive">سحب من المحفظة</div>
            </div>

            <form id="mainForm" onsubmit="submitData(event)">
                <input type="hidden" id="entryType" value="تحويل">
                
                <!-- حقل المرفقات الموحد (يظهر في الحالتين) -->
                <div class="bg-blue-50 p-4 rounded-lg mb-8 border border-blue-100">
                    <label class="label-lg text-blue-800">إرفاق صورة التحويل / الإيصال (اختياري)</label>
                    <input type="file" id="receiptImage" accept="image/*" class="input-lg bg-white" onchange="handleFile(event)">
                </div>

                <!-- نموذج التحويل -->
                <div id="transferFields">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        <div>
                            <label class="label-lg">الفرع</label>
                            <select id="branch" class="input-lg">
                                <option value="">اختر الفرع...</option>
                                <option value="فرع1">فرع 1</option><option value="فرع2">فرع 2</option><option value="فرع3">فرع 3</option>
                                <option value="فرع4">فرع 4</option><option value="فرع5">فرع 5</option><option value="فرع6">فرع 6</option>
                                <option value="فرع7">فرع 7</option><option value="فرع8">فرع 8</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-lg">طريقة الطلب</label>
                            <select id="orderMethod" class="input-lg">
                                <option value="عن طريق الفرع">عن طريق الفرع</option>
                                <option value="واتس">واتس</option>
                                <option value="الهاتف">الهاتف</option>
                            </select>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        <div><label class="label-lg">اسم العميل</label><input type="text" id="customerName" class="input-lg"></div>
                        <div><label class="label-lg">رقم الهاتف</label><input type="text" id="phone" class="input-lg"></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        <div><label class="label-lg">إجمالي الأوردر</label><input type="number" id="total" class="input-lg"></div>
                        <div><label class="label-lg text-green-700">المبلغ المحول</label><input type="number" id="transferred" class="input-lg border-green-400 bg-green-50"></div>
                    </div>
                    <div class="grid grid-cols-1 gap-6 mb-8">
                        <div><label class="label-lg">بون الفرع</label><input type="text" id="receiptNo" class="input-lg"></div>
                    </div>
                </div>

                <!-- نموذج السحب -->
                <div id="withdrawFields" class="hidden">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        <div><label class="label-lg text-red-700">المبلغ المسحوب</label><input type="number" id="withdrawn" class="input-lg border-red-400 bg-red-50"></div>
                        <div><label class="label-lg">الجهة (لمن تم السحب؟)</label><input type="text" id="destination" class="input-lg" placeholder="مثال: مورد سكر، عهدة فرع..."></div>
                    </div>
                </div>

                <!-- الملحوظة (مشتركة) -->
                <div class="mb-8">
                    <label class="label-lg">ملحوظة إضافية</label>
                    <input type="text" id="notes" class="input-lg" placeholder="اكتب أي ملاحظات هنا...">
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-green-600 text-white font-bold py-4 rounded-lg text-xl hover:bg-green-700 shadow-lg transition">حفظ العملية في الشيت</button>
                <p id="staffMsg" class="text-center mt-6 font-bold text-xl hidden"></p>
            </form>
        </div>
    </div>

    <!-- شاشة الإدارة (Admin Dashboard) -->
    <div id="adminView" class="max-w-7xl mx-auto mt-10 bg-white rounded-xl shadow-lg p-8 hidden">
        <div class="flex justify-between items-center mb-8 border-b-2 border-red-100 pb-6">
            <h2 class="text-3xl font-bold text-red-600">لوحة الإدارة - المراجعة الشاملة</h2>
            <div>
                <button onclick="fetchAdminData()" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-bold text-lg hover:bg-blue-700 mr-2 shadow">تحديث</button>
                <button onclick="logout()" class="bg-gray-500 text-white px-6 py-3 rounded-lg font-bold text-lg hover:bg-gray-600 shadow">خروج</button>
            </div>
        </div>
        <div class="overflow-x-auto text-lg">
            <table class="w-full text-right border-collapse">
                <thead>
                    <tr class="bg-red-50 text-red-800">
                        <th class="border p-3">التاريخ</th>
                        <th class="border p-3">التوقيت</th>
                        <th class="border p-3">النوع</th>
                        <th class="border p-3">العميل/الجهة</th>
                        <th class="border p-3">المحول/المسحوب</th>
                        <th class="border p-3">الموظف</th>
                        <th class="border p-3">المرفق</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // === ضع رابط جوجل سكريبت الجديد هنا ===
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyX1X3O8kJAO7nS5vWsA_jzjo5OWy9WRJNrYInZ1R-1t-JnxWozUtWNVi45FKYkpGoPdA/exec';
        
        let currentUser = null;
        let uploadedFile = null; // لتخزين الصورة

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                uploadedFile = {
                    base64: event.target.result.split(',')[1],
                    mimeType: file.type,
                    name: file.name
                };
            };
            reader.readAsDataURL(file);
        }

        function switchTab(tab) {
            const isTransfer = (tab === 'transfer');
            document.getElementById('entryType').value = isTransfer ? 'تحويل' : 'سحب';
            
            document.getElementById('tabTransfer').className = isTransfer ? 'tab-btn tab-active' : 'tab-btn tab-inactive';
            document.getElementById('tabWithdraw').className = !isTransfer ? 'tab-btn tab-active' : 'tab-btn tab-inactive';
            
            document.getElementById('transferFields').style.display = isTransfer ? 'block' : 'none';
            document.getElementById('withdrawFields').style.display = !isTransfer ? 'block' : 'none';
        }

        async function fetchAPI(data) {
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(data)
                });
                return await response.json();
            } catch (error) {
                return { status: 'error', message: 'مشكلة في الاتصال بالإنترنت' };
            }
        }

        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('loginError');
            
            errorMsg.classList.add('hidden');
            document.getElementById('loginView').style.opacity = '0.5';
            
            const result = await fetchAPI({ action: "login", username: user, password: pass });
            document.getElementById('loginView').style.opacity = '1';

            if(result.status === "success") {
                currentUser = result;
                document.getElementById('loginView').classList.add('hidden');
                
                if(result.role === 'admin') {
                    document.getElementById('adminView').classList.remove('hidden');
                    fetchAdminData();
                } else {
                    document.getElementById('staffView').classList.remove('hidden');
                    document.getElementById('staffNameDisplay').innerText = result.displayName;
                }
            } else {
                errorMsg.innerText = result.message;
                errorMsg.classList.remove('hidden');
            }
        }

        async function submitData(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('staffMsg');
            const type = document.getElementById('entryType').value;
            
            btn.disabled = true;
            btn.innerText = 'جاري رفع البيانات والصورة...';

            const payload = {
                action: "submitEntry",
                entryType: type,
                agentName: currentUser.displayName,
                notes: document.getElementById('notes').value,
                fileData: uploadedFile
            };

            if (type === "تحويل") {
                payload.branch = document.getElementById('branch').value;
                payload.orderMethod = document.getElementById('orderMethod').value;
                payload.customerName = document.getElementById('customerName').value;
                payload.phone = document.getElementById('phone').value;
                payload.total = document.getElementById('total').value;
                payload.transferred = document.getElementById('transferred').value;
                payload.receiptNo = document.getElementById('receiptNo').value;
            } else {
                payload.destination = document.getElementById('destination').value;
                payload.withdrawn = document.getElementById('withdrawn').value;
            }

            const result = await fetchAPI(payload);
            
            btn.disabled = false;
            btn.innerText = 'حفظ العملية في الشيت';
            
            if(result.status === "success") {
                msg.innerText = 'تم تسجيل العملية بنجاح!';
                msg.className = 'text-center mt-6 font-bold text-2xl text-green-600 block';
                document.getElementById('mainForm').reset();
                uploadedFile = null; // مسح الصورة بعد الرفع
            } else {
                msg.innerText = 'حدث خطأ. تأكد من الاتصال.';
                msg.className = 'text-center mt-6 font-bold text-2xl text-red-600 block';
            }
            setTimeout(() => { msg.classList.add('hidden'); }, 5000);
        }

        async function fetchAdminData() {
            const tbody = document.getElementById('adminTableBody');
            tbody.innerHTML = '<tr><td colspan="7" class="text-center p-6 text-gray-500">جاري تحميل البيانات...</td></tr>';
            const result = await fetchAPI({ action: "getAdminData" });
            if(result.status === "success") {
                tbody.innerHTML = '';
                result.data.forEach(row => {
                    // row[1]=التاريخ, row[2]=التوقيت, row[3]=العميل/الجهة, row[6]=المبلغ, row[11]=الموظف, row[13]=النوع, row[14]=الصورة
                    let imgLink = row[14] ? `<a href="${row[14]}" target="_blank" class="text-blue-600 underline">عرض الصورة</a>` : '-';
                    let amountStr = row[13] === 'سحب من المحفظة' ? `<span class="text-red-600 font-bold">-${row[6]}</span>` : `<span class="text-green-600 font-bold">+${row[6]}</span>`;
                    
                    tbody.innerHTML += `
                        <tr class="hover:bg-gray-50 border-b">
                            <td class="border p-3">${row[1]}</td>
                            <td class="border p-3 text-sm text-gray-500">${row[2]}</td>
                            <td class="border p-3 font-semibold ${row[13] === 'سحب من المحفظة' ? 'text-red-700' : 'text-blue-700'}">${row[13]}</td>
                            <td class="border p-3 font-bold">${row[3]}</td>
                            <td class="border p-3">${amountStr}</td>
                            <td class="border p-3 text-gray-700">${row[11]}</td>
                            <td class="border p-3 text-center">${imgLink}</td>
                        </tr>
                    `;
                });
            }
        }

        function logout() {
            currentUser = null;
            document.getElementById('loginView').classList.remove('hidden');
            document.getElementById('staffView').classList.add('hidden');
            document.getElementById('adminView').classList.add('hidden');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }
    </script>
</body>
</html>
