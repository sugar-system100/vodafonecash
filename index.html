<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم بندق - فودافون كاش</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-8 text-gray-800">

    <div id="loginView" class="max-w-md mx-auto bg-white rounded-lg shadow-md p-8 mt-10">
        <h2 class="text-2xl font-bold text-center text-red-600 mb-6">تسجيل الدخول للنظام</h2>
        <div class="mb-4">
            <label class="block text-gray-700 mb-2">اسم المستخدم:</label>
            <input type="text" id="username" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-red-500">
        </div>
        <div class="mb-6">
            <label class="block text-gray-700 mb-2">كلمة المرور:</label>
            <input type="password" id="password" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-red-500">
        </div>
        <button onclick="login()" class="w-full bg-red-600 text-white font-bold py-2 rounded-lg hover:bg-red-700">دخول</button>
        <p id="loginError" class="text-red-500 text-center mt-4 hidden"></p>
    </div>

    <div id="staffView" class="max-w-3xl mx-auto bg-white rounded-lg shadow-md p-8 hidden">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <h2 class="text-2xl font-bold text-red-600">تسجيل تحويل جديد</h2>
            <div class="text-sm font-semibold bg-gray-100 px-4 py-2 rounded">
             ممثل خدمة العملاء: <span id="staffNameDisplay" class="text-blue-600"></span>
                <button onclick="logout()" class="mr-4 text-red-500 hover:underline">تسجيل خروج</button>
            </div>
        </div>

        <form id="transferForm" onsubmit="submitTransfer(event)">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-gray-700 mb-2">الفرع</label>
                    <select id="branch" class="w-full px-3 py-2 border rounded-lg" required>
                        <option value="">اختر الفرع...</option>
                        <option value="فرع1">فرع 1</option>
                        <option value="فرع2">فرع 2</option>
                        <option value="فرع3">فرع 3</option>
                        <option value="فرع4">فرع 4</option>
                        <option value="فرع5">فرع 5</option>
                        <option value="فرع6">فرع 6</option>
                        <option value="فرع7">فرع 7</option>
                        <option value="فرع8">فرع 8</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-700 mb-2">طريقة الطلب</label>
                    <select id="orderMethod" class="w-full px-3 py-2 border rounded-lg" required>
                        <option value="عن طريق الفرع">عن طريق الفرع</option>
                        <option value="واتس">واتس</option>
                        <option value="الهاتف">الهاتف</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div><label class="block text-gray-700 mb-2">اسم العميل</label><input type="text" id="customerName" class="w-full px-3 py-2 border rounded-lg" required></div>
                <div><label class="block text-gray-700 mb-2">رقم الهاتف</label><input type="text" id="phone" class="w-full px-3 py-2 border rounded-lg" required></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div><label class="block text-gray-700 mb-2">إجمالي الأوردر</label><input type="number" id="total" class="w-full px-3 py-2 border rounded-lg" required></div>
                <div><label class="block text-gray-700 mb-2">المبلغ المحول</label><input type="number" id="transferred" class="w-full px-3 py-2 border rounded-lg" required></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div><label class="block text-gray-700 mb-2">بون الفرع</label><input type="text" id="receiptNo" class="w-full px-3 py-2 border rounded-lg" required></div>
                <div><label class="block text-gray-700 mb-2">ملحوظة</label><input type="text" id="notes" class="w-full px-3 py-2 border rounded-lg"></div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition">إرسال للشيت</button>
            <p id="staffMsg" class="text-center mt-4 font-bold hidden"></p>
        </form>
    </div>

    <div id="adminView" class="max-w-6xl mx-auto bg-white rounded-lg shadow-md p-8 hidden">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <h2 class="text-2xl font-bold text-red-600">لوحة الإدارة والمراجعة</h2>
            <div>
                <button onclick="fetchAdminData()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 mr-2">تحديث البيانات</button>
                <button onclick="logout()" class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">تسجيل خروج</button>
            </div>
        </div>

        <h3 class="font-bold mb-4">أحدث التحويلات (آخر 50 عملية)</h3>
        <div class="overflow-x-auto">
            <table class="w-full text-right border-collapse">
                <thead>
                    <tr class="bg-gray-200">
                        <th class="border p-2">التاريخ</th>
                        <th class="border p-2">العميل</th>
                        <th class="border p-2">الفرع</th>
                        <th class="border p-2">الإجمالي</th>
                        <th class="border p-2">المحول</th>
                        <th class="border p-2">المتبقي</th>
                        <th class="border p-2">الموظف</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody">
                    <tr><td colspan="7" class="text-center p-4">جاري التحميل...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzxOqRlov5ze4weQPoczr5TJULzpggoaUKtRdWLLfSGErjEroLEZlZgGloyF8VP-iaSrg/exec';
        let currentUser = null;

        async function fetchAPI(data) {
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(data)
                });
                return await response.json();
            } catch (error) {
                console.error('Error:', error);
                return { status: 'error', message: 'مشكلة في الاتصال بالإنترنت' };
            }
        }

        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('loginError');
            
            if(!user || !pass) {
                errorMsg.innerText = 'أدخل اسم المستخدم وكلمة المرور';
                errorMsg.classList.remove('hidden');
                return;
            }

            errorMsg.classList.add('hidden');
            const result = await fetchAPI({ action: "login", username: user, password: pass });

            if(result.status === "success") {
                currentUser = result;
                document.getElementById('loginView').classList.add('hidden');
                
                if(result.role === 'admin') {
                    document.getElementById('adminView').classList.remove('hidden');
                    fetchAdminData();
                } else {
                    document.getElementById('staffView').classList.remove('hidden');
                    document.getElementById('staffNameDisplay').innerText = result.displayName;
                }
            } else {
                errorMsg.innerText = result.message;
                errorMsg.classList.remove('hidden');
            }
        }

        async function submitTransfer(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('staffMsg');
            btn.disabled = true;
            btn.innerText = 'جاري الإرسال...';

            const payload = {
                action: "submitEntry",
                agentName: currentUser.displayName,
                branch: document.getElementById('branch').value,
                orderMethod: document.getElementById('orderMethod').value,
                customerName: document.getElementById('customerName').value,
                phone: document.getElementById('phone').value,
                total: document.getElementById('total').value,
                transferred: document.getElementById('transferred').value,
                receiptNo: document.getElementById('receiptNo').value,
                notes: document.getElementById('notes').value
            };

            const result = await fetchAPI(payload);
            
            btn.disabled = false;
            btn.innerText = 'إرسال للشيت';
            
            if(result.status === "success") {
                msg.innerText = 'تم التسجيل بنجاح!';
                msg.className = 'text-center mt-4 font-bold text-green-600 block';
                document.getElementById('transferForm').reset();
            } else {
                msg.innerText = 'حدث خطأ أثناء التسجيل';
                msg.className = 'text-center mt-4 font-bold text-red-600 block';
            }
            setTimeout(() => { msg.classList.add('hidden'); }, 4000);
        }

        async function fetchAdminData() {
            const tbody = document.getElementById('adminTableBody');
            tbody.innerHTML = '<tr><td colspan="7" class="text-center p-4">جاري التحميل...</td></tr>';
            
            const result = await fetchAPI({ action: "getAdminData" });
            
            if(result.status === "success") {
                tbody.innerHTML = '';
                if(result.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center p-4 text-gray-500">لا توجد تحويلات بعد</td></tr>';
                    return;
                }
                
                result.data.forEach(row => {
                    tbody.innerHTML += `
                        <tr class="hover:bg-gray-50">
                            <td class="border p-2">${row[1]}</td>
                            <td class="border p-2 font-semibold">${row[2]}</td>
                            <td class="border p-2">${row[7]}</td>
                            <td class="border p-2">${row[4]}</td>
                            <td class="border p-2 text-green-600 font-bold">${row[5]}</td>
                            <td class="border p-2 text-red-600 font-bold">${row[6]}</td>
                            <td class="border p-2">${row[10]}</td>
                        </tr>
                    `;
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center p-4 text-red-500">حدث خطأ في جلب البيانات</td></tr>';
            }
        }

        function logout() {
            currentUser = null;
            document.getElementById('loginView').classList.remove('hidden');
            document.getElementById('staffView').classList.add('hidden');
            document.getElementById('adminView').classList.add('hidden');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }
    </script>
</body>
</html>
